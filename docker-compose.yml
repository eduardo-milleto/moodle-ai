services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moodle_ai}
      POSTGRES_USER: ${POSTGRES_USER:-moodle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moodle}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-moodle} -d $${POSTGRES_DB:-moodle_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: moodle-ai-web
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://moodle:moodle@db:5432/moodle_ai}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"

  migrate:
    image: moodle-ai-web
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://moodle:moodle@db:5432/moodle_ai}
    depends_on:
      db:
        condition: service_healthy
    command: ["pnpm", "--filter", "@moodle-ai/db", "migrate"]

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://moodle:moodle@db:5432/moodle_ai}
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles:
      - caddy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
